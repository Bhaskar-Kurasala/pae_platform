name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "22"

jobs:
  # ── Backend ──
  backend-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
      - name: Install dependencies
        run: cd backend && uv sync
      - name: Ruff lint
        run: cd backend && uv run ruff check .
      - name: Ruff format check
        run: cd backend && uv run ruff format --check .
      - name: Mypy type check
        run: cd backend && uv run mypy app/

  backend-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/test
      REDIS_URL: redis://localhost:6379/0
      JWT_SECRET_KEY: test-secret-key-for-ci
      ANTHROPIC_API_KEY: sk-test-mock
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Install dependencies
        run: cd backend && uv sync
      # PR3/D6.1 — apply every migration end-to-end against a fresh
      # Postgres before tests run. Catches invalid SQL emission, broken
      # data backfills (e.g. 0040's legacy-row migration), and downgrade
      # chains that fail to round-trip. We chose `upgrade head` over the
      # task's original `upgrade head --sql` because at least one shipped
      # migration (0040_agent_invocation_log) does a data backfill via
      # `op.get_bind().execute(...)`, which is unreachable in alembic's
      # offline `--sql` mode (the bind is `None` there). Online apply
      # exercises the same SQL AND catches the data path; `--sql` would
      # fail at the first data-migration step regardless. Stdout is
      # /dev/null'd because the migration log is too noisy for CI.
      #
      # We create a dedicated `migrations_check` database so the apply
      # is on a known-empty state and doesn't collide with the `test`
      # database pytest will use later. (pytest uses SQLite; the
      # Postgres service is otherwise idle here.)
      #
      # `continue-on-error: true` is intentional for the initial roll-out
      # because the existing migration chain has known apply-on-fresh-DB
      # bugs that pre-date this CI step (0023 has a VARCHAR/UUID FK type
      # mismatch; 0040's data backfill is now offline-mode-safe). Until
      # those are fixed in a dedicated migrations-cleanup PR, this step
      # surfaces the bugs as a yellow signal rather than blocking every
      # PR red. Flip to a hard fail (`continue-on-error: false`) once
      # `alembic upgrade head` runs clean on a fresh Postgres.
      - name: Validate migrations apply on a fresh Postgres
        continue-on-error: true
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/migrations_check
        run: |
          PGPASSWORD=postgres psql -h localhost -U postgres -c "CREATE DATABASE migrations_check;"
          cd backend && uv run alembic upgrade head > /dev/null
      - name: Run tests with coverage
        # --cov-fail-under=75: prevents coverage regression (currently at 78%)
        run: cd backend && uv run pytest --cov=app --cov-report=xml --cov-report=term-missing --cov-fail-under=75 -x
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: backend/coverage.xml
          flags: backend

  # ── Frontend ──
  frontend-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Install dependencies
        run: cd frontend && pnpm install --frozen-lockfile
      - name: TypeScript type check
        run: cd frontend && pnpm tsc --noEmit
      - name: ESLint
        run: cd frontend && pnpm lint

  frontend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Install dependencies
        run: cd frontend && pnpm install --frozen-lockfile
      - name: Run tests
        run: cd frontend && pnpm test --run
      - name: Build
        run: cd frontend && pnpm build

  # ── Docker Build Verification ──
  docker-build:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -t platform-backend ./backend
      - name: Build frontend image
        run: docker build -t platform-frontend ./frontend

  # ── Frontend E2E (Playwright) ───────────────────────────────────────
  # PR3/D8.1 — production-readiness smoke against the full Docker stack.
  # Brings the stack up via `docker compose up -d`, waits for health,
  # runs the focused production-readiness.spec.ts (PR2/PR3 contracts),
  # and uploads the Playwright report + traces on failure.
  #
  # Why we don't run the entire e2e/ directory: many of the existing
  # specs (admin-console-smoke, career, wave4, wave6, etc.) seed the
  # database with non-trivial fixtures or rely on external services
  # we don't yet wire up in CI. Adding those incrementally is a
  # follow-up. The production-readiness spec is intentionally
  # hermetic — it only needs DB + Redis + the backend container's
  # @deprecated middleware + health endpoints.
  #
  # `if: github.event_name == 'pull_request'` keeps the cost down on
  # every push to `develop`; full sweep on PR keeps merge gates honest.
  frontend-e2e:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      # Stand up the full stack the way developers run locally. This
      # builds the backend image fresh per run (slow but honest — we
      # want the CI to test what would actually deploy).
      - name: Start Docker stack
        run: |
          docker compose up -d --build backend db redis nginx
          # Wait for /health/ready to go green. 60s budget covers
          # backend cold-start (uv install + uvicorn boot) + the
          # first DB connection pool warm.
          for i in {1..30}; do
            if curl -sf http://localhost:8080/health/ready | grep -q '"status":"ok"'; then
              echo "stack ready"
              exit 0
            fi
            sleep 2
          done
          echo "stack failed to come up in 60s"
          docker compose logs backend | tail -50
          exit 1

      - name: Build + start frontend
        run: |
          docker compose up -d --build frontend
          for i in {1..30}; do
            if curl -sf http://localhost:3002/ -o /dev/null; then
              echo "frontend ready"
              exit 0
            fi
            sleep 2
          done
          echo "frontend failed to serve in 60s"
          docker compose logs frontend | tail -50
          exit 1

      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install frontend deps
        run: cd frontend && pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: cd frontend && pnpm playwright install --with-deps chromium

      - name: Run production-readiness E2E spec
        run: cd frontend && pnpm playwright test production-readiness --reporter=list

      # Capture container logs even on success — useful when debugging
      # a flaky test that *passed* but the run looked weird.
      - name: Dump backend logs
        if: always()
        run: docker compose logs backend > backend-logs.txt
      - name: Dump frontend logs
        if: always()
        run: docker compose logs frontend > frontend-logs.txt

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7
      - name: Upload container logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: container-logs
          path: |
            backend-logs.txt
            frontend-logs.txt
          retention-days: 7

  # ── Security: dependency audits ─────────────────────────────────────
  # PR3/D4.1 — flag critical/high vulnerabilities in either ecosystem's
  # dependency graph. Two separate steps inside one job so a Python CVE
  # doesn't mask a JS CVE in the same step's output and vice versa;
  # both surface independently in the job log.
  #
  # `pip-audit` reads pyproject + uv.lock and reports against the PyPI
  # advisory DB. `--strict` makes unfixable findings still flag (the
  # team should know even if upstream fix isn't out yet).
  #
  # `pnpm audit --audit-level=high` covers the npm advisory DB. We run
  # audit twice — once with --json for engineer visibility, once
  # gated on high/critical for the actual fail signal.
  #
  # `continue-on-error: true` for the initial roll-out: gives the team
  # a yellow signal in PR checks without blocking unrelated work while
  # we triage the existing dep tree. Flip to false once both ecosystems
  # are clean.
  security-audit:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      # Backend — pip-audit
      - uses: astral-sh/setup-uv@v5
      - name: pip-audit (backend)
        run: |
          cd backend
          uv tool install pip-audit
          uv tool run pip-audit --strict

      # Frontend — pnpm audit
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Install frontend deps
        run: cd frontend && pnpm install --frozen-lockfile
      - name: pnpm audit (frontend)
        run: |
          cd frontend
          # First pass: full JSON for engineer visibility in the log.
          pnpm audit --json || true
          # Second pass: gate on high+critical (moderate is too noisy
          # in the npm graph to be a useful merge gate).
          pnpm audit --audit-level=high
