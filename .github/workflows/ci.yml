name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "22"

jobs:
  # ── Backend ──
  backend-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
      - name: Install dependencies
        run: cd backend && uv sync
      - name: Ruff lint
        run: cd backend && uv run ruff check .
      - name: Ruff format check
        run: cd backend && uv run ruff format --check .
      - name: Mypy type check
        run: cd backend && uv run mypy app/

  backend-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/test
      REDIS_URL: redis://localhost:6379/0
      JWT_SECRET_KEY: test-secret-key-for-ci
      ANTHROPIC_API_KEY: sk-test-mock
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Install dependencies
        run: cd backend && uv sync
      # PR3/D6.1 — apply every migration end-to-end against a fresh
      # Postgres before tests run. Catches invalid SQL emission, broken
      # data backfills (e.g. 0040's legacy-row migration), and downgrade
      # chains that fail to round-trip. We chose `upgrade head` over the
      # task's original `upgrade head --sql` because at least one shipped
      # migration (0040_agent_invocation_log) does a data backfill via
      # `op.get_bind().execute(...)`, which is unreachable in alembic's
      # offline `--sql` mode (the bind is `None` there). Online apply
      # exercises the same SQL AND catches the data path; `--sql` would
      # fail at the first data-migration step regardless. Stdout is
      # /dev/null'd because the migration log is too noisy for CI.
      #
      # We create a dedicated `migrations_check` database so the apply
      # is on a known-empty state and doesn't collide with the `test`
      # database pytest will use later. (pytest uses SQLite; the
      # Postgres service is otherwise idle here.)
      #
      # `continue-on-error: true` is intentional for the initial roll-out
      # because the existing migration chain has known apply-on-fresh-DB
      # bugs that pre-date this CI step (0023 has a VARCHAR/UUID FK type
      # mismatch; 0040's data backfill is now offline-mode-safe). Until
      # those are fixed in a dedicated migrations-cleanup PR, this step
      # surfaces the bugs as a yellow signal rather than blocking every
      # PR red. Flip to a hard fail (`continue-on-error: false`) once
      # `alembic upgrade head` runs clean on a fresh Postgres.
      - name: Validate migrations apply on a fresh Postgres
        continue-on-error: true
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/migrations_check
        run: |
          PGPASSWORD=postgres psql -h localhost -U postgres -c "CREATE DATABASE migrations_check;"
          cd backend && uv run alembic upgrade head > /dev/null
      - name: Run tests with coverage
        # --cov-fail-under=75: prevents coverage regression (currently at 78%)
        run: cd backend && uv run pytest --cov=app --cov-report=xml --cov-report=term-missing --cov-fail-under=75 -x
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: backend/coverage.xml
          flags: backend

  # ── Frontend ──
  frontend-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Install dependencies
        run: cd frontend && pnpm install --frozen-lockfile
      - name: TypeScript type check
        run: cd frontend && pnpm tsc --noEmit
      - name: ESLint
        run: cd frontend && pnpm lint

  frontend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Install dependencies
        run: cd frontend && pnpm install --frozen-lockfile
      - name: Run tests
        run: cd frontend && pnpm test --run
      - name: Build
        run: cd frontend && pnpm build

  # ── Docker Build Verification ──
  docker-build:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -t platform-backend ./backend
      - name: Build frontend image
        run: docker build -t platform-frontend ./frontend
