version: '3.9'

services:
  # ── Frontend ──
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8080
    ports:
      - "3002:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8080
      # Docker Desktop on Windows/WSL2 doesn't forward inotify events into the
      # container reliably, so Next.js HMR misses file changes. Polling works.
      - WATCHPACK_POLLING=true
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    restart: unless-stopped

  # ── Backend API ──
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8001:8000"
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend/app:/app/app
      - ./backend/alembic:/app/alembic
      - ./backend/alembic.ini:/app/alembic.ini
    restart: unless-stopped
    # PR3/C6.3 — readiness probe ensures the container is marked unhealthy
    # only when the API can actually serve traffic. Hits `/health/ready`,
    # which 200s when DB+Redis are reachable and 503s otherwise. The probe
    # treats any non-2xx HTTP response as failure (urlopen raises
    # `HTTPError` on 503, which exits the python -c with non-zero).
    # `start_period` gives the app time for migrations + LLM client init.
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health/ready')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── Celery Worker (async tasks) ──
  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: uv run celery -A app.core.celery_app worker --loglevel=info --concurrency=4
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend/app:/app/app
    restart: unless-stopped

  # ── Celery Beat (scheduled tasks) ──
  # DISC-1: depends on db (tasks import SQLAlchemy models that bind at import).
  # `--schedule=/tmp/celerybeat-schedule` + `--pidfile=` avoid the two silent
  # restart-loop causes: a stale pidfile in CWD (refuses to boot) and an
  # un-writable schedule shelve file on read-only app layer.
  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: >
      uv run celery -A app.core.celery_app beat
      --loglevel=info
      --schedule=/tmp/celerybeat-schedule
      --pidfile=
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend/app:/app/app
    restart: unless-stopped

  # ── PostgreSQL ──
  # Postgres 16 + pgvector pre-baked. Same major version as the
  # previous postgres:16-alpine image, so existing pgdata volumes
  # carry over without a re-init. Required for the Agentic OS
  # primitives layer (migration 0054) which `CREATE EXTENSION
  # vector` — alpine omits the extension binaries.
  #
  # Pinned to a digest (not just the tag) so a silent rebuild of
  # pgvector/pgvector:pg16 upstream cannot break dev mid-week.
  # Digest captured 2026-05-01 from `docker pull pgvector/pgvector:pg16`.
  db:
    image: pgvector/pgvector:pg16@sha256:7d400e340efb42f4d8c9c12c6427adb253f726881a9985d2a471bf0eed824dff
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-platform}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Redis ──
  redis:
    image: redis:7-alpine
    ports:
      - "6381:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Meilisearch (full-text search) ──
  meilisearch:
    image: getmeili/meilisearch:latest
    ports:
      - "7700:7700"
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-masterKey123}
    volumes:
      - meilidata:/meili_data
    restart: unless-stopped

  # ── Nginx (reverse proxy) ──
  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
  meilidata:
