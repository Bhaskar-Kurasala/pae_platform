events {
    worker_connections 1024;
}

http {
    # Docker embedded DNS so upstream hostnames are re-resolved when a
    # service container is recreated (otherwise nginx caches the IP at
    # startup and 502s forever after `docker compose restart backend`).
    resolver 127.0.0.11 ipv6=off valid=10s;

    server {
        listen 80;
        server_name localhost;

        # API routes → FastAPI backend.
        # We use a variable for the upstream so nginx defers DNS resolution
        # until request time, honoring the resolver above.
        location /api/ {
            set $backend_upstream http://backend:8000;
            proxy_pass $backend_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
        }

        # WebSocket connections → FastAPI backend
        location /ws/ {
            set $backend_ws http://backend:8000;
            proxy_pass $backend_ws;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_read_timeout 86400s;
        }

        # Health check endpoint
        location /health {
            set $backend_health http://backend:8000;
            proxy_pass $backend_health;
        }

        # OpenAPI docs
        location /docs {
            set $backend_docs http://backend:8000;
            proxy_pass $backend_docs;
        }

        location /openapi.json {
            set $backend_openapi http://backend:8000;
            proxy_pass $backend_openapi;
        }

        # Next.js static assets — content-hashed filenames, safe to cache long-term
        location /_next/static/ {
            set $frontend_static http://frontend:3000;
            proxy_pass $frontend_static;
            proxy_set_header Host $host;
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        # Next.js HTML pages and RSC payloads — must revalidate so new deploys
        # deliver updated chunk URLs immediately without a hard refresh
        location /_next/ {
            set $frontend_next http://frontend:3000;
            proxy_pass $frontend_next;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            add_header Cache-Control "no-cache";
        }

        # Everything else → Next.js frontend
        location / {
            set $frontend_root http://frontend:3000;
            proxy_pass $frontend_root;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            add_header Cache-Control "no-cache";
        }
    }
}
